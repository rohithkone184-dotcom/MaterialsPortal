<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<title>Select Your Branch</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
}

.container{
background:white;
padding:40px;
width:420px;
border-radius:15px;
box-shadow:0 10px 25px rgba(0,0,0,0.3);
text-align:center;
}

.container h2{
margin-bottom:25px;
color:#333;
font-size:26px;
}

.branch-btn{
display:block;
width:100%;
margin:12px 0;
padding:12px;
font-size:18px;
border:none;
border-radius:8px;
cursor:pointer;
transition:0.3s;
font-weight:bold;
}

.cme{
background:#4CAF50;
color:white;
}

.ece{
background:#2196F3;
color:white;
}

.eee{
background:#FF9800;
color:white;
}

.branch-btn:hover{
transform:scale(1.05);
box-shadow:0 6px 15px rgba(0,0,0,0.3);
}

.footer{
margin-top:20px;
font-size:13px;
color:gray;
}
a{
text-decoration: none;
}s

</style>
</head>

<body>

<div class="container">

<h2>Select Your Branch</h2>

<a href="test2.html">

</a>

</a>

</div>
